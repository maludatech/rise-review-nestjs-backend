name: Database Migrations

on:
  push:
    branches: [main]
    paths:
      - 'prisma/**/migrations/**'
      - 'prisma/**/*.prisma'

  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  migrate:
    name: Deploy Prisma Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Rise Review migrations
        run: npx prisma migrate deploy --config=prisma/rise-review/prisma.config.ts
        env:
          RISE_REVIEW_DATABASE_URL: ${{ secrets.RISE_REVIEW_DATABASE_URL }}

      - name: Run Internal migrations
        run: npx prisma migrate deploy --config=prisma/internal/prisma.config.ts
        env:
          INTERNAL_DATABASE_URL: ${{ secrets.INTERNAL_DATABASE_URL }}
